# ===============================
# Active Profile (default: dev — override with SPRING_PROFILES_ACTIVE=prod)
# ===============================
spring.profiles.active=dev

# ===============================
# OpenAPI / Swagger
# ===============================
app.openapi.server-url=${OPENAPI_SERVER_URL:http://localhost:8080}

# ===============================
# Server Configuration
# ===============================
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework

# ===============================
# Startup Optimization
# ===============================
spring.context.parallel-init=true
spring.jmx.enabled=false

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ticket_system}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Admin123@}

# ===============================
# Schema Management (Flyway + Hibernate validate)
# Flyway runs manually in the main() method before Spring starts.
# baseline-version=2 means V1__init and V2__add_account_lockout are
# considered already applied. All schema changes use V3+, V4+, etc.
# Hibernate validate ensures entities match the Flyway-managed schema.
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:local-dev-only-not-for-prod-12345678901234567890}
jwt.expiration=${JWT_EXPIRATION:900000}

# ===============================
# Redis Configuration
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.repositories.enabled=false
spring.data.jpa.repositories.base-packages=com.ticket.ticket_system.repository

# ===============================
# File Upload Limits (5MB max)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# HikariCP Connection Pool
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===============================
# Graceful Shutdown
# ===============================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===============================
# Email Configuration (SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ===============================
# Storage (local or s3)
# ===============================
app.storage.type=${STORAGE_TYPE:local}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:us-east-1}
app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}

# ===============================
# Jackson
# ===============================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false
