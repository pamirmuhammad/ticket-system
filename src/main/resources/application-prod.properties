# ===============================
# Prod Profile — secure, minimal info leakage
# ===============================

# SQL logging off
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging levels
logging.level.com.ticket.ticket_system=INFO
logging.level.org.springframework.security=WARN
logging.level.flywaydb=WARN

# Actuator — health only, no info leakage
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.mappings.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.threaddump.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.loggers.enabled=false
management.endpoint.conditions.enabled=false
