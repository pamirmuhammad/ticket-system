# ===============================
# Dev Profile — verbose, full actuator
# ===============================

# SQL logging (set true only when debugging queries)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging levels
logging.level.com.ticket.ticket_system=DEBUG
logging.level.org.springframework.security=WARN
logging.level.flywaydb=INFO

# Actuator — expose all dev-useful endpoints
management.endpoints.web.exposure.include=health,info,readiness,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
management.endpoint.mappings.enabled=false
management.endpoint.configprops.enabled=false
management.endpoint.threaddump.enabled=false
management.endpoint.heapdump.enabled=false
management.endpoint.loggers.enabled=false
management.endpoint.conditions.enabled=false
