apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticket-system
  namespace: ticket-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ticket-system.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ticket-system
                port:
                  name: http
